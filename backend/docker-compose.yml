services:
  tictactoe-frontend:
    build:
      context: ..
      dockerfile: backend/Dockerfile-Frontend
    env_file:
      - .env
    container_name: tictactoe-frontend
    ports:
      - "80:80"

  tictactoe-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tictactoe-server-app
    ports:
      - "8081:8080"
    environment:
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      REDIRECT_URL: ${REDIRECT_URL}
      TARGET_URL: ${TARGET_URL}
      SPRING_DATASOURCE_URL: jdbc:mariadb://tictactoe-mariadb:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      - tictactoe-mariadb

  tictactoe-mariadb:
    image: mariadb:11.8
    container_name: tictactoe-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    healthcheck: # https://mariadb.com/docs/server/server-management/automated-mariadb-deployment-and-administration/docker-and-mariadb/using-healthcheck-sh#compose-file-example
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    volumes:
      - mariadb-volume-tictactoe:/var/lib/mysql

volumes:
  mariadb-volume-tictactoe:
